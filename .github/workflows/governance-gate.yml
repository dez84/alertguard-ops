name: Alert Guard Governance Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-alerts:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the repository code inside the GitHub Runner
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Set up a dedicated Python environment on the runner
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Step 3: Upgrade pip and install dependencies directly from requirements.txt
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # Step 4: Execute the Validator Engine
    - name: Execute Governance Compliance Scan
      run: |
        python main.py 